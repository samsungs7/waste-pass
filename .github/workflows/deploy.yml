name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master # 當程式碼推送到 master 分支時觸發自動部署

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite 打包後的輸出資料夾
          branch: gh-pages # 要發布到的目標分支
